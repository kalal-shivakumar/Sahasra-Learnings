name: Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify index.html Exists
        run: |
          if [ -f "index.html" ]; then
            echo "✓ index.html found"
            ls -lh index.html
            head -c 200 index.html
          else
            echo "✗ index.html not found!"
            exit 1
          fi

      - name: Authenticate with Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CLIENTID }}
          tenant-id: ${{ secrets.TENANTID }}
          subscription-id: ${{ secrets.SUBSCRIPTIONID }}

      - name: Deploy Static Website to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: kalal-java-app
          package: .

      - name: Verify Deployment
        run: |
          echo "✓ Deployment completed successfully!"
          echo "📝 Website deployed from: ${{ github.repository }}"
          echo "🔗 Access at: https://kalal-java-app.azurewebsites.net"
          echo "📦 App Service: kalal-java-app"
          echo "📍 Resource Group: rg-kalal"

      - name: Logout from Azure
        if: always()
        run: az logout || true
